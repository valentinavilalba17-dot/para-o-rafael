<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nosso Oceano 💙</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
font-family:Georgia, serif;
}


/* CÉU */

.celeste{

height:100vh;
width:100%;

background:
radial-gradient(circle at center,#183456 0%,#020611 70%);

position:relative;

}


/* ESTRELAS */

.estrela{

position:absolute;

width:4px;
height:4px;

background:white;

border-radius:50%;

animation:brilhar 3s infinite alternate;

}


@keyframes brilhar{

from{
opacity:.2;
}

to{
opacity:1;
}

}



/* CONTEÚDO PRINCIPAL */

.conteudo{

position:absolute;

top:50%;
left:50%;

transform:translate(-50%,-50%);

width:90%;

text-align:center;

color:white;

}



.data{

font-size:30px;

opacity:0;

animation:aparecer 2s forwards;

animation-delay:2s;

}



.frase{

font-size:20px;

margin-top:25px;

line-height:1.5;

opacity:0;

animation:aparecer 2s forwards;

animation-delay:4s;

}



.barco{

font-size:70px;

margin-top:35px;

opacity:0;

animation:

aparecer 2s forwards,

navegar 4s infinite alternate;

animation-delay:6s;

}



@keyframes navegar{

from{
transform:translateX(-15px);
}

to{
transform:translateX(15px);
}

}



.botao{

margin-top:35px;

padding:15px 35px;

border-radius:30px;

background:transparent;

border:1px solid white;

color:white;

font-size:18px;

opacity:0;

animation:aparecer 2s forwards;

animation-delay:7s;

}



@keyframes aparecer{

from{

opacity:0;

transform:translateY(20px);

}

to{

opacity:1;

transform:translateY(0);

}

}


</style>

</head>



<body>


<div class="celeste">


<span class="estrela" style="top:15%;left:20%;"></span>

<span class="estrela" style="top:30%;left:75%;"></span>

<span class="estrela" style="top:60%;left:35%;"></span>

<span class="estrela" style="top:25%;left:50%;"></span>

<span class="estrela" style="top:80%;left:70%;"></span>



<div class="conteudo">


<div class="data">

18 de novembro de 2025

</div>


<div class="frase">

“Foi aqui que Deus começou a escrever nossa história.”

</div>


<div class="barco">

⛵

</div>


<button class="botao">

⛵ Continuar navegando

</button>


</div>


</div>



</body>

</html>
