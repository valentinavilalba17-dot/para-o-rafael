<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nosso Oceano 💙</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Georgia,serif;
overflow:hidden;
}


/* PRIMEIRA CENA */

#ceu{

height:100vh;
background:radial-gradient(circle,#183456,#000);
position:relative;
color:white;

}


.estrela{

position:absolute;
width:4px;
height:4px;
background:white;
border-radius:50%;
animation:piscar 2s infinite alternate;

}


@keyframes piscar{

from{opacity:.2}
to{opacity:1}

}


.conteudo{

position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
width:90%;

}


.data{

font-size:30px;
opacity:0;
animation:entrar 2s forwards;
animation-delay:2s;

}


.frase{

font-size:20px;
margin-top:25px;
opacity:0;
animation:entrar 2s forwards;
animation-delay:4s;

}


.barco{

font-size:70px;
margin-top:35px;
opacity:0;
animation:entrar 2s forwards;
animation-delay:6s;

}


.botao{

margin-top:35px;
padding:15px 35px;
border-radius:30px;
background:none;
border:1px solid white;
color:white;
font-size:18px;

opacity:0;
animation:entrar 2s forwards;
animation-delay:7s;

}


@keyframes entrar{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}



/* SEGUNDA CENA */

#envelope{

display:none;

height:100vh;

background:linear-gradient(#081a30,#0c4660);

color:white;

align-items:center;

justify-content:center;

flex-direction:column;

}


.carta-envelope{

width:280px;
height:180px;
background:white;
border-radius:12px;
position:relative;

}


.selo{

position:absolute;
top:15px;
left:50%;
transform:translateX(-50%);

background:#d8efff;

width:45px;
height:45px;

border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

font-size:25px;

}


.nome-envelope{

position:absolute;

bottom:40px;

width:100%;

text-align:center;

color:#234;

font-size:22px;

}


</style>
</head>

<body>


<!-- CÉU -->

<div id="ceu">


<span class="estrela" style="top:20%;left:20%"></span>
<span class="estrela" style="top:30%;left:75%"></span>
<span class="estrela" style="top:60%;left:40%"></span>
<span class="estrela" style="top:15%;left:80%"></span>


<div class="conteudo">


<div class="data">

18 de novembro de 2025

</div>


<div class="frase">

“Foi aqui que Deus começou a escrever nossa história.”

</div>


<div class="barco">

⛵

</div>


<button class="botao" onclick="abrirEnvelope()">

⛵ Continuar navegando

</button>


</div>


</div>



<!-- ENVELOPE -->


<div id="envelope">


<div class="carta-envelope">


<div class="selo">

💙

</div>


<div class="nome-envelope">

Para o meu amor

</div>


</div>


</div>



<script>


function abrirEnvelope(){

document.getElementById("ceu").style.display="none";

document.getElementById("envelope").style.display="flex";

}


</script>



</body>

</html>
