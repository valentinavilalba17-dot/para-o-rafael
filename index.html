<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nosso Oceano 💙</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    font-family: Georgia, serif;
    background:#000;
}

/* CÉU */

.cem{
    height:100vh;
    width:100%;
    background:radial-gradient(circle at center, #10233d 0%, #000 70%);
    position:relative;
    overflow:hidden;
}

/* ESTRELAS */

.estrela{
    position:absolute;
    width:3px;
    height:3px;
    background:white;
    border-radius:50%;
    opacity:0;
    animation:aparecer 3s forwards;
}

@keyframes aparecer{
    from{
        opacity:0;
    }
    to{
        opacity:1;
    }
}


/* CONTEÚDO */

.conteudo{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    color:white;
}


.data{
    font-size:28px;
    opacity:0;
    animation:entrada 3s forwards;
    animation-delay:3s;
}

.frase{
    margin-top:25px;
    font-size:20px;
    max-width:400px;
    opacity:0;
    animation:entrada 3s forwards;
    animation-delay:5s;
}


@keyframes entrada{
    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}


/* BARQUINHO */

.barco{
    font-size:70px;
    margin-top:50px;
    opacity:0;
    animation:
    entrada 3s forwards,
    navegar 6s infinite alternate;
    animation-delay:7s;
}


@keyframes navegar{

    from{
        transform:translateX(-20px);
    }

    to{
        transform:translateX(20px);
    }

}


/* BOTÃO */

.botao{

    margin-top:40px;
    background:none;
    border:1px solid white;
    color:white;
    padding:15px 35px;
    border-radius:30px;
    font-size:18px;
    cursor:pointer;

    opacity:0;
    animation:entrada 3s forwards;
    animation-delay:8s;

}


</style>

</head>


<body>


<div class="cem">


<!-- estrelas -->

<span class="estrela" style="top:20%;left:30%;animation-delay:1s"></span>

<span class="estrela" style="top:40%;left:70%;animation-delay:2s"></span>

<span class="estrela" style="top:15%;left:80%;animation-delay:3s"></span>

<span class="estrela" style="top:65%;left:20%;animation-delay:4s"></span>

<span class="estrela" style="top:75%;left:60%;animation-delay:5s"></span>


<div class="conteudo">


<div class="data">
18 de novembro de 2025
</div>


<div class="frase">
“Foi aqui que Deus começou a escrever nossa história.”
</div>


<div class="barco">
⛵
</div>


<button class="botao">
⛵ Continuar navegando
</button>


</div>


</div>


</body>
</html>
